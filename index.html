<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>picgraf</title>
    
    <!-- Favicon - PNG preferred, SVG fallback -->
    <link rel="icon" type="image/png" href="/favicon-source.png" />
    <link rel="apple-touch-icon" href="/favicon-source.png" />

    <!-- Primary Meta Tags -->
    <meta name="title" content="Semantic Visual Explorer" />
    <meta name="description" content="AI-powered photo discovery and curation" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://picgraf.com/" />
    <meta property="og:site_name" content="picgraf" />
    <meta property="og:title" content="Semantic Visual Explorer" />
    <meta property="og:description" content="AI-powered photo discovery and curation" />
    <meta property="og:image" content="https://picgraf.com/og-image.jpg?v=2" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://picgraf.com/" />
    <meta name="twitter:title" content="Semantic Visual Explorer" />
    <meta name="twitter:description" content="AI-powered photo discovery and curation" />
    <meta name="twitter:image" content="https://picgraf.com/og-image.jpg?v=2" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#0a0a1a" />
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Playfair+Display:wght@400;500;600&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
